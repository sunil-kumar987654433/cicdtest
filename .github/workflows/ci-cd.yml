  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/masterone'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy via Docker Compose to EC2
      env:
        SSH_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        HOST: ${{ secrets.EC2_HOST }}
        USER: ${{ secrets.EC2_USER }}
      run: |
        # 1. Private key decode aur permission set karein
        echo "$SSH_KEY_B64" | base64 -d > private_key.pem
        chmod 600 private_key.pem
        
        # 2. GitHub Secret se real .env file generate karein
        echo "${{ secrets.PROD_ENV }}" > .env
        
        # 3. Target directory ensure karein, source code aur hidden .env dono explicit copy karein
        ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} "mkdir -p /home/${USER}/app"
        scp -o StrictHostKeyChecking=no -i private_key.pem -r ./* ${USER}@${HOST}:/home/${USER}/app/
        # FIX LAYER: Hidden .env file ko explicit copy kiya taaki scp use miss na kare
        scp -o StrictHostKeyChecking=no -i private_key.pem .env ${USER}@${HOST}:/home/${USER}/app/.env
        
        # 4. Remote EC2 terminal par Docker Compose execute karein
        ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} << 'EOF'
        set -e
        cd /home/$(whoami)/app
        
        # Standalone tool fallback checking layer
        if ! command -v docker-compose &> /dev/null && ! docker compose version &> /dev/null; then
          echo "Installing Docker Compose binary tool..."
          sudo curl -L "https://github.com(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
        fi
        
        # Legacy monolithic cleanup
        docker stop fastapi-container || true
        docker rm fastapi-container || true
        sudo fuser -k 8000/tcp || true
        
        # Microservices stack building orchestration layer
        if command -v docker-compose &> /dev/null; then
          docker-compose down
          docker-compose build --no-cache
          docker-compose up --force-recreate -d
        else
          docker compose down
          docker compose build --no-cache
          docker compose up --force-recreate -d
        fi
        
        sleep 5
        docker ps
        echo "✅ Multi-Container Stack Deployed successfully!"
        EOF
        
        # 5. Local runner workspace security purging action
        rm -f private_key.pem
        rm -f .env
