  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to EC2
      env:
        PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        HOST: ${{ secrets.EC2_HOST }}
        USER: ${{ secrets.EC2_USERNAME }}
      run: |
        echo "$PRIVATE_KEY" > private_key.pem
        chmod 600 private_key.pem
        
        # Target directory ensure karein aur files copy karein
        ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} "mkdir -p /home/${USER}/app"
        scp -o StrictHostKeyChecking=no -i private_key.pem -r ./* ${USER}@${HOST}:/home/${USER}/app/
        
        # 'EOF' use kiya taaki variables EC2 par chaley, GitHub par nahi
        ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} << 'EOF'
          set -e
          
          # EC2 par login hone ke baad user pata lagayein
          CURRENT_USER=$(whoami)
          cd /home/$CURRENT_USER/app
          
          # Install Python and pip if not present
          if ! command -v pip3 &> /dev/null; then
            echo "Installing Python pip..."
            sudo apt-get update
            sudo apt-get install -y python3-pip python3-venv
          fi
          
          # Create and activate virtual environment
          python3 -m venv venv || true
          source venv/bin/activate
          
          # Install/Update dependencies
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn
          
          # Create systemd service if it doesn't exist
          if [ ! -f /etc/systemd/system/fastapi-app.service ]; then
            echo "Creating systemd service..."
            echo "[Unit]" | sudo tee /etc/systemd/system/fastapi-app.service > /dev/null
            echo "Description=FastAPI Application" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "After=network.target" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "[Service]" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "Type=simple" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "User=$CURRENT_USER" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "WorkingDirectory=/home/$CURRENT_USER/app" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "Environment=\"PATH=/home/$CURRENT_USER/app/venv/bin\"" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "ExecStart=/home/$CURRENT_USER/app/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "Restart=always" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "RestartSec=3" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "[Install]" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
            echo "WantedBy=multi-user.target" | sudo tee -a /etc/systemd/system/fastapi-app.service > /dev/null
          fi
          
          # Stop existing service (if running)
          sudo systemctl stop fastapi-app.service || true
          
          # Reload, enable and start the service
          sudo systemctl daemon-reload
          sudo systemctl enable fastapi-app.service
          sudo systemctl start fastapi-app.service
          
          # Wait a moment for service to start
          sleep 2
          
          # Check status
          sudo systemctl status fastapi-app.service --no-pager
          
          echo "✅ Deployment completed successfully!"
EOF
        
        rm -f private_key.pem
