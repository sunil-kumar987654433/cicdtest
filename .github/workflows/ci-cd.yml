name: CI/CD Docker Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx uvicorn
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=app --cov-report=term-missing || echo "No tests found, skipping..."

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy via Docker to EC2
      env:
        SSH_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        HOST: ${{ secrets.EC2_HOST }}
        USER: ${{ secrets.EC2_USER }}
      run: |
        # 1. Private key regenerate aur permissions set karein
        echo "$SSH_KEY_B64" | base64 -d > private_key.pem
        chmod 600 private_key.pem
        
        # 2. GitHub Runner ke andar hi Docker Image Build karein
        docker build -t fastapi-app:latest .
        
        # 3. Built Image ko tar compressed file me save karein taaki EC2 par transfer kiya ja sake
        docker save fastapi-app:latest | gzip > fastapi-app.tar.gz
        
        # 4. Target folder ensure karein aur compressed image ko EC2 par scp karein
        ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} "mkdir -p /home/${USER}/app"
        scp -o StrictHostKeyChecking=no -i private_key.pem fastapi-app.tar.gz ${USER}@${HOST}:/home/${USER}/app/
        
        # 5. EC2 par remote deployment commands chalayein
        ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER}@${HOST} << 'EOF'
        set -e
        cd /home/$(whoami)/app
        
        # Purane chal rahe container ko stop aur remove karein (agar koi ho)
        docker stop fastapi-container || true
        docker rm fastapi-container || true
        
        # Nayi image ko Docker me load karein
        gunzip -c fastapi-app.tar.gz | docker load
        
        # Naya Docker container background (-d) me Port 8000 par run karein
        docker run -d --name fastapi-container -p 8000:8000 --restart always fastapi-app:latest
        
        # Cleanup: raw tar file ko remove karein memory bachane ke liye
        rm -f fastapi-app.tar.gz
        
        # Status verify karein log output ke liye
        sleep 2
        docker ps | grep fastapi-container
        echo "✅ Docker Deployment completed successfully!"
        EOF
        
        # 6. GitHub Actions workspace cleanup karein
        rm -f private_key.pem
        rm -f fastapi-app.tar.gz
