services:
  # 1. Redis Cache & Broker Service
  redis-broker:
    image: redis:7-alpine
    container_name: redis_container
    restart: always
    network_mode: "host"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI Web Application
  web-app:
    build: .
    container_name: fastapi_container
    restart: always
    network_mode: "host"
    # FIX LAYER: Explicit command allocation defined
    command: ["web"] 
    env_file: [.env]
    depends_on:
      redis-broker: { condition: service_healthy }

  # 3. Celery Worker Service
  celery-worker:
    build: .
    container_name: celery_worker_container
    restart: always
    network_mode: "host"
    # FIX LAYER: String variable execution syntax explicitly synchronized
    command: ["worker"]
    env_file: [.env]
    depends_on:
      redis-broker: { condition: service_healthy }

volumes:
  redis_data:
