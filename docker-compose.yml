version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres_container
    restart: always
    env_file: [.env]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d fastdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-broker:
    image: redis:7-alpine
    container_name: redis_container
    restart: always
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🚀 FastAPI Service
  web-app:
    build: .
    container_name: fastapi_container
    restart: always
    ports: ["8000:8000"]
    command: ["web"] # Script me "web" section trigger hoga
    env_file: [.env]
    depends_on:
      postgres-db: { condition: service_healthy }
      redis-broker: { condition: service_healthy }

  # 🚀 Celery Worker Service
  celery-worker:
    build: .
    container_name: celery_worker_container
    restart: always
    command: ["worker"] # Script me "worker" section trigger hoga
    env_file: [.env]
    depends_on:
      postgres-db: { condition: service_healthy }
      redis-broker: { condition: service_healthy }

  # 🚀 Celery Beat Service
  # celery-beat:
  #   build: .
  #   container_name: celery_beat_container
  #   restart: always
  #   command: ["beat"] # Script me "beat" section trigger hoga
  #   env_file: [.env]
  #   depends_on:
  #     postgres-db: { condition: service_healthy }
  #     redis-broker: { condition: service_healthy }

volumes:
  postgres_data:
  redis_data:
